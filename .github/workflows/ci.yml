name: ci

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore "DropAndForget.Tests/DropAndForget.Tests.csproj"

      - name: Build
        run: dotnet build "DropAndForget.Tests/DropAndForget.Tests.csproj" --configuration Release --no-restore

      - name: Test
        run: dotnet test "DropAndForget.Tests/DropAndForget.Tests.csproj" --configuration Release --no-build
